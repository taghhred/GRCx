services:
  db:
    image: postgres:16-alpine
    container_name: grcx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grcx}
      # Required — set POSTGRES_PASSWORD in .env (no insecure default).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-grcx}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - grcx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grcx} -d ${POSTGRES_DB:-grcx}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: grcx-ai
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      AI_PORT: "8090"
      AI_HOST: "0.0.0.0"
      PORT: "8090"
      GRCX_ENV: ${GRCX_ENV:-development}
      ALLOW_LOCAL_OLLAMA: "1"
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-}
      TRANSLATION_ENABLED: ${TRANSLATION_ENABLED:-true}
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-glossary}
      MODEL_LANGUAGE: ${MODEL_LANGUAGE:-ar}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://api:8000}
    # Do not publish AI to the host network — backend reaches it on the compose network only.
    expose:
      - "8090"
    volumes:
      - ai_logs:/app/logs
      - ai_tmp:/app/tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=4)",
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 90s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4g

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grcx-api
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-grcx}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-grcx}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      AI_PROVIDER: ${AI_PROVIDER:-imtithal}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8090}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-120}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  grcx_pgdata:
  ai_logs:
  ai_tmp:
